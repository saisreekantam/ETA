# One-command run:  docker compose up
#
# GPU (NVIDIA toolkit on host, Linux/Windows only):
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
#   ...or just:  ./run-gpu.sh
#
# Apple Silicon / Mac: plain `docker compose up` works and runs CPU-only -- Docker
# can't pass the Metal GPU into Linux containers, so don't use the gpu overlay there.
# To run the LLM on a Mac's GPU, run the backend natively (not in Docker) with
# OLLAMA_NUM_GPU=999.
#
# Services: postgres (pgvector) + ollama + backend (FastAPI) + frontend (nginx).
# The backend entrypoint waits for Postgres, runs migrations, and seeds on startup.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: isi
      POSTGRES_PASSWORD: isi
      POSTGRES_DB: industrial_safety
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isi -d industrial_safety"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    entrypoint: ["/bin/bash", "/ollama-entrypoint.sh"]
    volumes:
      - ollama:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    environment:
      OLLAMA_MODEL: llama3.1:8b
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://isi:isi@postgres:5432/industrial_safety
      OLLAMA_URL: http://ollama:11434
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      API_KEY_REQUIRED: "false"
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Browser runs on the host, so it reaches the backend at the published host port.
        VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  ollama:
